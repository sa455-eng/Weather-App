<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <div class="search">
            <input type="text" placeholder="Search City...">
            <button>
                <img src="assets/search.png" alt="">
            </button>
        </div>
        <div class="error">
            <p>Invalid City</p>
        </div>
        <div class="weather">
            <img src="assets/clear.png" class="weather-icon">

            <h1 class="temp">--°C</h1>
            <h2 class="city">--</h2>

            <div class="details">

                <div class="col">
                    <img src="assets/humidity.png">
                    <div>
                        <h3 class="humidity">--%</h3>
                        <p>Humidity</p>
                    </div>
                </div>

                <div class="col">
                    <img src="assets/wind.png">
                    <div>
                        <h3 class="wind">-- km/h</h3>
                        <p>Wind Speed</p>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="api.js"></script>
</body>
</html>
